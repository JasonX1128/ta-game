  <text x="130" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#1d2430">[4, 6, 8]</text>
  <text x="130" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#1d2430">[]</text>
  <path d="M236 180h108" stroke="#2d5f8b" stroke-width="8" stroke-linecap="round"/>
  <path d="M344 180l-24-18v36z" fill="#2d5f8b"/>
  <rect x="364" y="92" width="194" height="176" rx="14" fill="#ffffff" stroke="#d9ded8" stroke-width="4"/>
  <text x="461" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#1d2430">average()</text>
  <text x="461" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#667085">sum / length</text>
  <path d="M578 180h70" stroke="#c37b22" stroke-width="8" stroke-linecap="round"/>
