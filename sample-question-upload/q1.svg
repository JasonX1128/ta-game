<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Average Function Diagram</title>
  <desc id="desc">Values flow into an average function and return a result.</desc>
  <rect width="720" height="360" fill="#fbfaf5"/>
  <rect x="42" y="82" width="176" height="196" rx="14" fill="#e8f2ed" stroke="#1f7a5c" stroke-width="4"/>
